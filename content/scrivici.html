<h1>📧 Scrivici</h1>
<p class="subtitle">Compila il modulo per inviarci un messaggio.<br>Ti risponderemo al più presto.</p>

<div class="separator">✦ ✦ ✦</div>

<div style="background: #f8faff; padding: 30px; border-radius: 12px; border: 1px solid #e8edf5; max-width: 700px; margin: 0 auto;">
    <form id="contact-form" onsubmit="return false;">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="user_name" class="form-label">👤 Nome Completo *</label>
                <input type="text" id="user_name" name="name" class="form-input" 
                       autocomplete="name" required placeholder="Mario Rossi">
            </div>

            <div class="form-group">
                <label for="user_email" class="form-label">✉️ La tua Email *</label>
                <input type="email" id="user_email" name="email" class="form-input" 
                       autocomplete="email" required placeholder="mario@email.it">
            </div>
        </div>

        <div class="form-group">
            <label for="user_phone" class="form-label">📱 Numero di Telefono (Opzionale)</label>
            <input type="tel" id="user_phone" name="telefono" class="form-input" 
                   autocomplete="tel" placeholder="333 1234567">
        </div>

        <div class="form-group">
            <label for="message" class="form-label">💬 Il tuo Messaggio *</label>
            <textarea id="message" name="message" class="form-input" rows="8" 
                      autocomplete="off" required placeholder="Scrivi qui il tuo messaggio..."></textarea>
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <button type="button" id="submit-btn" class="btn-invia">
                <span id="btn-text">📨 Invia Messaggio</span>
                <span id="btn-loading" style="display: none;">⏳ Invio in corso...</span>
            </button>
        </div>

        <div id="form-status" style="text-align: center; margin-top: 15px; font-weight: bold; font-size: 1.05rem;"></div>
    </form>
</div>

<!-- Script EmailJS - VERSIONE CONVERGENTE -->
<script type="text/javascript">
    // Carica EmailJS dinamicamente se non è già caricato
    (function loadEmailJS() {
        if (typeof emailjs !== 'undefined') {
            console.log('✅ EmailJS già caricato!');
            initEmailJS();
            return;
        }

        console.log('📥 Caricamento EmailJS...');
        var script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
        script.onload = function() {
            console.log('✅ EmailJS caricato con successo!');
            initEmailJS();
        };
        script.onerror = function() {
            console.error('❌ Errore nel caricamento di EmailJS!');
            document.getElementById('form-status').innerHTML = '❌ Errore di connessione. Riprova più tardi.';
            document.getElementById('form-status').style.color = '#dc3545';
        };
        document.head.appendChild(script);
    })();

    // Inizializza EmailJS e configura il form
    function initEmailJS() {
        console.log('🚀 Inizializzazione EmailJS...');

        try {
            emailjs.init({
                publicKey: "dlcgcFKY-gzS7RQKJ",
            });
            console.log('✅ EmailJS inizializzato con successo!');
            setupForm();
        } catch (error) {
            console.error('❌ Errore inizializzazione EmailJS:', error);
            document.getElementById('form-status').innerHTML = '❌ Errore di configurazione. Contatta il webmaster.';
            document.getElementById('form-status').style.color = '#dc3545';
        }
    }

    // Configura il form dopo che EmailJS è pronto
    function setupForm() {
        console.log('🔧 Configurazione form...');

        const form = document.getElementById('contact-form');
        const btn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const statusDiv = document.getElementById('form-status');

        if (!form || !btn) {
            console.error('❌ Elementi del form non trovati!');
            return;
        }

        // Rimuovi eventuali listener precedenti (clona il pulsante)
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);

        // Riferimento al nuovo pulsante
        const newBtnText = newBtn.querySelector('#btn-text');
        const newBtnLoading = newBtn.querySelector('#btn-loading');

        // Funzione per mostrare messaggi
        function showMessage(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.style.color = type === 'error' ? '#dc3545' : 
                                   type === 'success' ? '#28a745' : '#0886f5fb';
        }

        function clearStatus() {
            statusDiv.innerHTML = '';
        }

        // Gestione click sul pulsante
        newBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();

            console.log('🔘 Pulsante Invia cliccato!');
            clearStatus();

            // Leggi i valori
            const name = document.getElementById('user_name').value.trim();
            const email = document.getElementById('user_email').value.trim();
            const telefono = document.getElementById('user_phone').value.trim();
            const message = document.getElementById('message').value.trim();

            console.log('📝 Dati raccolti:', { name, email, telefono, message });

            // Validazione
            if (!name) {
                showMessage('❌ Inserisci il tuo Nome.', 'error');
                document.getElementById('user_name').focus();
                return;
            }

            if (!email) {
                showMessage('❌ Inserisci la tua Email.', 'error');
                document.getElementById('user_email').focus();
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showMessage('❌ Inserisci un indirizzo Email valido.', 'error');
                document.getElementById('user_email').focus();
                return;
            }

            if (!message) {
                showMessage('❌ Scrivi il tuo messaggio.', 'error');
                document.getElementById('message').focus();
                return;
            }

            // Disabilita pulsante
            newBtn.disabled = true;
            newBtnText.style.display = 'none';
            newBtnLoading.style.display = 'inline';
            showMessage('⏳ Invio in corso...', 'loading');

            // Prepara i dati
            const templateParams = {
                title: "Messaggio dal sito Gente del Titano",
                name: name,
                email: email,
                message: message
            };

            console.log('📤 Invio a EmailJS:', templateParams);

            // Invia
            emailjs.send("service_f726zbu", "template_sdsez1q", templateParams)
                .then(function(response) {
                    console.log('✅ Invio riuscito!', response);
                    showMessage('✅ Messaggio inviato con successo! Ti risponderemo presto.', 'success');
                    form.reset();

                    newBtn.disabled = false;
                    newBtnText.style.display = 'inline';
                    newBtnLoading.style.display = 'none';

                    setTimeout(clearStatus, 10000);
                })
                .catch(function(error) {
                    console.error('❌ Errore:', error);
                    showMessage('❌ Errore durante l\'invio. Riprova più tardi.', 'error');

                    newBtn.disabled = false;
                    newBtnText.style.display = 'inline';
                    newBtnLoading.style.display = 'none';
                });
        });

        // Previeni submit
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });

        // Pulisci stato quando l'utente digita
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', clearStatus);
        });

        console.log('✅ Script pronto! In attesa del click su Invia...');
        document.getElementById('form-status').innerHTML = '✅ Pronto per l\'invio!';
        document.getElementById('form-status').style.color = '#28a745';
        setTimeout(clearStatus, 3000);
    }

    // Fallback: se DOM non è ancora pronto, aspetta
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM caricato (evento)');
        });
    } else {
        console.log('📄 DOM già caricato');
    }

    console.log('🚀 Script principale caricato!');
</script>
