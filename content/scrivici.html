<h1>📧 Scrivici</h1>
<p class="subtitle">Compila il modulo per inviarci un messaggio.<br>Ti risponderemo al più presto.</p>

<div class="separator">✦ ✦ ✦</div>

<div style="background: #f8faff; padding: 30px; border-radius: 12px; border: 1px solid #e8edf5; max-width: 700px; margin: 0 auto;">
    <form id="contact-form" onsubmit="return false;">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="user_name" class="form-label">👤 Nome Completo *</label>
                <input type="text" id="user_name" name="name" class="form-input" 
                       autocomplete="name" required placeholder="Mario Rossi">
            </div>

            <div class="form-group">
                <label for="user_email" class="form-label">✉️ La tua Email *</label>
                <input type="email" id="user_email" name="email" class="form-input" 
                       autocomplete="email" required placeholder="mario@email.it">
            </div>
        </div>

        <div class="form-group">
            <label for="user_phone" class="form-label">📱 Numero di Telefono (Opzionale)</label>
            <input type="tel" id="user_phone" name="telefono" class="form-input" 
                   autocomplete="tel" placeholder="333 1234567">
        </div>

        <div class="form-group">
            <label for="message" class="form-label">💬 Il tuo Messaggio *</label>
            <textarea id="message" name="message" class="form-input" rows="8" 
                      autocomplete="off" required placeholder="Scrivi qui il tuo messaggio..."></textarea>
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <button type="button" id="submit-btn" class="btn-invia">
                <span id="btn-text">📨 Invia Messaggio</span>
                <span id="btn-loading" style="display: none;">⏳ Invio in corso...</span>
            </button>
        </div>

        <div id="form-status" style="text-align: center; margin-top: 15px; font-weight: bold; font-size: 1.05rem;"></div>
    </form>
</div>

<!-- Script EmailJS -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>

<script>
    console.log('🚀 Script EmailJS caricato!');

    // Aspetta che il DOM sia pronto
    document.addEventListener('DOMContentLoaded', function() {
        console.log('📄 DOM caricato!');

        // Riferimenti agli elementi
        const form = document.getElementById('contact-form');
        const btn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const statusDiv = document.getElementById('form-status');

        // Inizializza EmailJS con la tua Public Key
        try {
            emailjs.init({
                publicKey: "dlcgcFKY-gzS7RQKJ",
            });
            console.log('✅ EmailJS inizializzato con successo!');
        } catch (error) {
            console.error('❌ Errore inizializzazione EmailJS:', error);
            statusDiv.innerHTML = '❌ Errore di configurazione. Contatta il webmaster.';
            statusDiv.style.color = '#dc3545';
        }

        // Funzione per mostrare messaggi di validazione
        function showError(message, fieldId) {
            statusDiv.innerHTML = '❌ ' + message;
            statusDiv.style.color = '#dc3545';
            if (fieldId) {
                document.getElementById(fieldId).focus();
                document.getElementById(fieldId).style.borderColor = '#dc3545';
                setTimeout(() => {
                    document.getElementById(fieldId).style.borderColor = '';
                }, 3000);
            }
        }

        function showSuccess(message) {
            statusDiv.innerHTML = '✅ ' + message;
            statusDiv.style.color = '#28a745';
        }

        function showLoading(message) {
            statusDiv.innerHTML = '⏳ ' + message;
            statusDiv.style.color = '#0886f5fb';
        }

        function clearStatus() {
            statusDiv.innerHTML = '';
        }

        // Gestione click sul pulsante Invia
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            console.log('🔘 Pulsante Invia cliccato!');

            clearStatus();

            // Leggi i valori dai campi
            const name = document.getElementById('user_name').value.trim();
            const email = document.getElementById('user_email').value.trim();
            const telefono = document.getElementById('user_phone').value.trim();
            const message = document.getElementById('message').value.trim();

            console.log('📝 Dati raccolti:', { name, email, telefono, message });

            // ---- VALIDAZIONE ----
            if (!name) {
                showError('Inserisci il tuo Nome.', 'user_name');
                return;
            }

            if (!email) {
                showError('Inserisci la tua Email.', 'user_email');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showError('Inserisci un indirizzo Email valido.', 'user_email');
                return;
            }

            if (!message) {
                showError('Scrivi il tuo messaggio.', 'message');
                return;
            }

            // ---- PREPARA L'INVIO ----
            // Disabilita il pulsante
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            showLoading('Invio in corso...');

            // Prepara i parametri per EmailJS
            const templateParams = {
                title: "Messaggio dal sito Gente del Titano",
                name: name,
                email: email,
                message: message
            };

            console.log('📤 Invio a EmailJS:', templateParams);

            // ---- INVIA CON EMAILJS ----
            emailjs.send("service_f726zbu", "template_sdsez1q", templateParams)
                .then(function(response) {
                    console.log('✅ Invio riuscito!', response);
                    
                    showSuccess('Messaggio inviato con successo! Ti risponderemo presto.');
                    
                    // Reset del form
                    form.reset();
                    
                    // Ripristina il pulsante
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';

                    // Nascondi il messaggio dopo 10 secondi
                    setTimeout(function() {
                        clearStatus();
                    }, 10000);
                })
                .catch(function(error) {
                    console.error('❌ Errore durante l\'invio:', error);
                    
                    showError('Errore durante l\'invio. Riprova più tardi.');
                    
                    // Ripristina il pulsante
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                });
        });

        // Previeni il submit del form (sicurezza extra)
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('🚫 Submit del form prevenuto');
            return false;
        });

        // Pulisci lo stato quando l'utente inizia a digitare
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                clearStatus();
                this.style.borderColor = '';
            });
        });

        console.log('✅ Script pronto! In attesa del click su Invia...');
    });
</script>
