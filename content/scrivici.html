<h1>📧 Scrivici</h1>
<p class="subtitle">Compila il modulo per inviarci un messaggio.<br>Ti risponderemo al più presto.</p>

<div class="separator">✦ ✦ ✦</div>

<div style="background: #f8faff; padding: 30px; border-radius: 12px; border: 1px solid #e8edf5; max-width: 700px; margin: 0 auto;">
    <form id="contact-form" onsubmit="return false;">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="user_name" class="form-label">👤 Nome Completo *</label>
                <input type="text" id="user_name" name="name" class="form-input" required placeholder="Mario Rossi">
            </div>

            <div class="form-group">
                <label for="user_email" class="form-label">✉️ La tua Email *</label>
                <input type="email" id="user_email" name="email" class="form-input" required placeholder="mario@email.it">
            </div>
        </div>

        <div class="form-group">
            <label for="user_phone" class="form-label">📱 Numero di Telefono (Opzionale)</label>
            <input type="tel" id="user_phone" name="telefono" class="form-input" placeholder="333 1234567">
        </div>

        <div class="form-group">
            <label for="message" class="form-label">💬 Il tuo Messaggio *</label>
            <textarea id="message" name="message" class="form-input" rows="8" required placeholder="Scrivi qui il tuo messaggio..."></textarea>
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <button type="button" id="submit-btn" class="btn-invia">
                <span id="btn-text">📨 Invia Messaggio</span>
                <span id="btn-loading" style="display: none;">⏳ Invio in corso...</span>
            </button>
        </div>

        <div id="form-status" style="text-align: center; margin-top: 15px; font-weight: bold; font-size: 1.05rem;"></div>
    </form>
</div>

<!-- Script EmailJS -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>

<script>
    console.log('🚀 Script EmailJS caricato!');

    // Aspetta che il DOM sia pronto
    document.addEventListener('DOMContentLoaded', function() {
        console.log('📄 DOM caricato!');

        // Riferimenti agli elementi
        const form = document.getElementById('contact-form');
        const btn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const statusDiv = document.getElementById('form-status');

        // Inizializza EmailJS con la tua Public Key
        try {
            emailjs.init({
                publicKey: "dlcgcFKY-gzS7RQKJ",
            });
            console.log('✅ EmailJS inizializzato con successo!');
            statusDiv.innerHTML = '✅ Pronto per l\'invio!';
            statusDiv.style.color = '#28a745';
            setTimeout(() => { statusDiv.innerHTML = ''; }, 3000);
        } catch (error) {
            console.error('❌ Errore inizializzazione EmailJS:', error);
            statusDiv.innerHTML = '❌ Errore di configurazione. Contatta il webmaster.';
            statusDiv.style.color = '#dc3545';
        }

        // Gestione click sul pulsante Invia
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            console.log('🔘 Pulsante Invia cliccato!');

            // Pulisci messaggi precedenti
            statusDiv.innerHTML = '';
            statusDiv.style.color = '#0886f5fb';

            // Leggi i valori dai campi
            const name = document.getElementById('user_name').value.trim();
            const email = document.getElementById('user_email').value.trim();
            const telefono = document.getElementById('user_phone').value.trim();
            const message = document.getElementById('message').value.trim();

            console.log('📝 Dati raccolti:', { name, email, telefono, message });

            // ---- VALIDAZIONE ----
            if (!name) {
                statusDiv.innerHTML = '❌ Inserisci il tuo Nome.';
                statusDiv.style.color = '#dc3545';
                document.getElementById('user_name').focus();
                return;
            }

            if (!email) {
                statusDiv.innerHTML = '❌ Inserisci la tua Email.';
                statusDiv.style.color = '#dc3545';
                document.getElementById('user_email').focus();
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                statusDiv.innerHTML = '❌ Inserisci un indirizzo Email valido.';
                statusDiv.style.color = '#dc3545';
                document.getElementById('user_email').focus();
                return;
            }

            if (!message) {
                statusDiv.innerHTML = '❌ Scrivi il tuo messaggio.';
                statusDiv.style.color = '#dc3545';
                document.getElementById('message').focus();
                return;
            }

            // ---- PREPARA L'INVIO ----
            // Disabilita il pulsante
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            statusDiv.innerHTML = '⏳ Invio in corso...';
            statusDiv.style.color = '#0886f5fb';

            // Prepara i parametri per EmailJS (come nel test che funziona)
            const templateParams = {
                title: "Messaggio dal sito Gente del Titano",  // Oggetto della mail
                name: name,                                    // Nome del mittente
                email: email,                                  // Email del mittente
                message: message                               // Messaggio
            };

            console.log('📤 Invio a EmailJS con parametri:', templateParams);
            console.log('📤 Service ID: service_f726zbu');
            console.log('📤 Template ID: template_sdsez1q');

            // ---- INVIA CON EMAILJS ----
            // Usa ESATTAMENTE la stessa sintassi del test che funziona
            emailjs.send("service_f726zbu", "template_sdsez1q", templateParams)
                .then(function(response) {
                    console.log('✅ Invio riuscito!', response);
                    console.log('✅ Status:', response.status);
                    console.log('✅ Testo:', response.text);
                    
                    statusDiv.innerHTML = '✅ Messaggio inviato con successo! Ti risponderemo presto.';
                    statusDiv.style.color = '#28a745';
                    
                    // Reset del form
                    form.reset();
                    
                    // Ripristina il pulsante
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';

                    // Nascondi il messaggio dopo 10 secondi
                    setTimeout(function() {
                        statusDiv.innerHTML = '';
                    }, 10000);
                })
                .catch(function(error) {
                    console.error('❌ Errore durante l\'invio:', error);
                    console.error('❌ Dettagli errore:', JSON.stringify(error, null, 2));
                    
                    statusDiv.innerHTML = '❌ Errore durante l\'invio. Riprova più tardi.';
                    statusDiv.style.color = '#dc3545';

                    // Ripristina il pulsante
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                });
        });

        // Previeni il submit del form (sicurezza extra)
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopPropagation();
            console.log('🚫 Submit del form prevenuto');
            return false;
        });

        console.log('✅ Script pronto! In attesa del click su Invia...');
    });
</script>
