<h1>📧 Scrivici</h1>
<p class="subtitle">👉 Compila il modulo per inviarci un messaggio.<br>
⏰ Ti risponderemo al più presto.</p>

<div class="separator">✦ ✦ ✦</div>

<div style="background: #f8faff; padding: 30px; border-radius: 12px; border: 1px solid #e8edf5; max-width: 700px; margin: 0 auto;">
    <form id="contact-form" onsubmit="return false;">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="user_name" class="form-label">👤 Nome Completo *</label>
                <input type="text" id="user_name" name="name" class="form-input" 
                       autocomplete="name" required placeholder="Mario Rossi">
            </div>

            <div class="form-group">
                <label for="user_email" class="form-label">✉️ La tua Email *</label>
                <input type="email" id="user_email" name="email" class="form-input" 
                       autocomplete="email" required placeholder="mario@email.it">
            </div>
        </div>

        <div class="form-group">
            <label for="user_phone" class="form-label">📱 Numero di Telefono (Opzionale)</label>
            <input type="tel" id="user_phone" name="telefono" class="form-input" 
                   autocomplete="tel" placeholder="333 1234567">
        </div>

        <div class="form-group">
            <label for="message" class="form-label">💬 Il tuo Messaggio *</label>
            <textarea id="message" name="message" class="form-input" rows="8" 
                      autocomplete="off" required placeholder="Scrivi qui il tuo messaggio..."></textarea>
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <button type="button" id="submit-btn" class="btn-invia">
                <span id="btn-text">📨 Invia Messaggio</span>
                <span id="btn-loading" style="display: none;">⏳ Invio in corso...</span>
            </button>
        </div>

        <div id="form-status" style="text-align: center; margin-top: 15px; font-weight: bold; font-size: 1.05rem;"></div>
    </form>
</div>

<!-- Script EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>

<script>
(function() {
    console.log('🚀 Script scrivici caricato!');

    function initForm() {
        console.log('📄 Inizializzazione form...');

        const form = document.getElementById('contact-form');
        const btn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const statusDiv = document.getElementById('form-status');

        if (!form || !btn) {
            console.error('❌ Elementi del form non trovati!');
            return;
        }

        try {
            emailjs.init({
                publicKey: "dlcgcFKY-gzS7RQKJ",
            });
            console.log('✅ EmailJS inizializzato!');
        } catch (error) {
            console.error('❌ Errore EmailJS:', error);
            statusDiv.innerHTML = '❌ Errore di configurazione.';
            statusDiv.style.color = '#dc3545';
            return;
        }

        btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();

            console.log('🔘 Click su Invia!');

            const name = document.getElementById('user_name').value.trim();
            const email = document.getElementById('user_email').value.trim();
            const telefono = document.getElementById('user_phone').value.trim();
            const message = document.getElementById('message').value.trim();

            // Validazione
            if (!name) {
                statusDiv.innerHTML = '❌ Inserisci il tuo Nome.';
                statusDiv.style.color = '#dc3545';
                document.getElementById('user_name').focus();
                return;
            }
            if (!email || !email.includes('@')) {
                statusDiv.innerHTML = '❌ Inserisci una Email valida.';
                statusDiv.style.color = '#dc3545';
                document.getElementById('user_email').focus();
                return;
            }
            if (!message) {
                statusDiv.innerHTML = '❌ Scrivi il tuo messaggio.';
                statusDiv.style.color = '#dc3545';
                document.getElementById('message').focus();
                return;
            }

            // Disabilita pulsante
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            statusDiv.innerHTML = '⏳ Invio in corso...';
            statusDiv.style.color = '#0886f5fb';

            // 🔥 FORMATTA LA DATA IN ITALIANO
            const now = new Date();
            const time = now.toLocaleString('it-IT', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            console.log('📅 Data formattata:', time);

            // Invia con tutti i campi
            emailjs.send("service_f726zbu", "template_sdsez1q", {
                title: "Messaggio dal sito Gente del Titano",
                name: name,
                email: email,
                telefono: telefono || 'Non indicato',  // ← AGGIUNTO
                time: time,                             // ← AGGIUNTO (DATA)
                message: message,
                year: now.getFullYear()                 // ← AGGIUNTO
            })
            .then(function(response) {
                console.log('✅ Inviato!', response);
                statusDiv.innerHTML = '✅ Messaggio inviato con successo!';
                statusDiv.style.color = '#28a745';
                form.reset();
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
                setTimeout(function() { statusDiv.innerHTML = ''; }, 8000);
            })
            .catch(function(error) {
                console.error('❌ Errore:', error);
                statusDiv.innerHTML = '❌ Errore durante l\'invio. Riprova.';
                statusDiv.style.color = '#dc3545';
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            });
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            return false;
        });

        console.log('✅ Form pronto!');
        statusDiv.innerHTML = '✅ Pronto per l\'invio!';
        statusDiv.style.color = '#28a745';
        setTimeout(function() { statusDiv.innerHTML = ''; }, 3000);
    }

    function waitForEmailJS(retries) {
        retries = retries || 0;
        if (typeof emailjs !== 'undefined') {
            console.log('✅ EmailJS trovato!');
            initForm();
            return;
        }
        if (retries > 30) {
            console.error('❌ EmailJS non caricato!');
            document.getElementById('form-status').innerHTML = '❌ Errore di caricamento. Ricarica.';
            document.getElementById('form-status').style.color = '#dc3545';
            return;
        }
        console.log('⏳ Attendendo EmailJS... (' + (retries + 1) + '/30)');
        setTimeout(function() { waitForEmailJS(retries + 1); }, 200);
    }

    waitForEmailJS();
})();
</script>
