<h1>📧 Scrivici</h1>
<p class="subtitle">👉 Compila il modulo per inviarci un messaggio. Ti risponderemo al più presto. 👈</p>

<div class="separator">✦ ✦ ✦</div>

<div style="background: #f8faff; padding: 30px; border-radius: 12px; border: 1px solid #e8edf5; max-width: 700px; margin: 0 auto;">
    <form id="contact-form" onsubmit="return false;">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label for="user_name" class="form-label">👤 Nome Completo *</label>
                <input type="text" id="user_name" name="name" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="user_email" class="form-label">✉️ La tua Email *</label>
                <input type="email" id="user_email" name="email" class="form-input" required>
            </div>
        </div>

        <div class="form-group">
            <label for="user_phone" class="form-label">📱 Numero di Telefono (Opzionale)</label>
            <input type="tel" id="user_phone" name="telefono" class="form-input">
        </div>

        <div class="form-group">
            <label for="message" class="form-label">💬 Il tuo Messaggio *</label>
            <textarea id="message" name="message" class="form-input" rows="8" required></textarea>
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <button type="button" id="submit-btn" class="btn-invia">
                📨 Invia Messaggio
            </button>
        </div>

        <div id="form-status" style="text-align: center; margin-top: 15px; font-weight: bold; font-size: 1.05rem;"></div>
    </form>
</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>

<script>
// ATTENDI CHE EMAILJS SIA CARICATO
function waitForEmailJS(retries) {
    retries = retries || 0;
    if (typeof emailjs !== 'undefined') {
        console.log('✅ EmailJS trovato!');
        initForm();
        return;
    }
    if (retries > 20) {
        console.error('❌ EmailJS non caricato dopo 20 tentativi');
        document.getElementById('form-status').innerHTML = '❌ Errore di caricamento. Ricarica la pagina.';
        document.getElementById('form-status').style.color = '#dc3545';
        return;
    }
    console.log('⏳ Attendendo EmailJS... tentativo ' + (retries + 1));
    setTimeout(function() { waitForEmailJS(retries + 1); }, 200);
}

function initForm() {
    emailjs.init("dlcgcFKY-gzS7RQKJ");
    console.log('✅ EmailJS inizializzato!');

    document.getElementById('submit-btn').addEventListener('click', function() {
        var name = document.getElementById('user_name').value.trim();
        var email = document.getElementById('user_email').value.trim();
        var message = document.getElementById('message').value.trim();

        if (!name || !email || !message) {
            document.getElementById('form-status').innerHTML = '❌ Compila tutti i campi obbligatori.';
            document.getElementById('form-status').style.color = '#dc3545';
            return;
        }

        document.getElementById('form-status').innerHTML = '⏳ Invio in corso...';
        document.getElementById('form-status').style.color = '#0886f5fb';
        this.disabled = true;

        emailjs.send("service_f726zbu", "template_sdsez1q", {
            title: "Messaggio dal sito",
            name: name,
            email: email,
            message: message
        })
        .then(function() {
            document.getElementById('form-status').innerHTML = '✅ Messaggio inviato!';
            document.getElementById('form-status').style.color = '#28a745';
            document.getElementById('contact-form').reset();
            document.getElementById('submit-btn').disabled = false;
        })
        .catch(function(error) {
            document.getElementById('form-status').innerHTML = '❌ Errore: ' + error.text;
            document.getElementById('form-status').style.color = '#dc3545';
            document.getElementById('submit-btn').disabled = false;
        });
    });

    console.log('✅ Form pronto!');
}

// Avvia
waitForEmailJS();
</script>
